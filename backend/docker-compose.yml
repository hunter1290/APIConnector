services:
  postgres:
    image: postgres:16-alpine
    container_name: apiconnector-postgres
    environment:
      POSTGRES_DB: apiconnector
      POSTGRES_USER: apiconnector
      POSTGRES_PASSWORD: apiconnector
    ports:
      - "5432:5432"
    volumes:
      - apiconnector_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiconnector -d apiconnector"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  apiconnector_pgdata:
