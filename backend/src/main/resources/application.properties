spring.application.name=apiconnector

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== PostgreSQL Datasource =====
# Override via environment variables in each environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/apiconnector}
spring.datasource.username=${DB_USERNAME:apiconnector}
spring.datasource.password=${DB_PASSWORD:apiconnector}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# 'update' for local dev convenience; switch to 'validate' + Flyway/Liquibase for prod.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ===== JWT =====
# Base64-encoded 256-bit secret. MUST be overridden in every real environment.
app.security.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==}
# Access token lifetime in milliseconds (default 1 hour).
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ===== CORS =====
# Comma-separated list of allowed frontend origins.
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===== Seed admin account =====
# Created on startup if missing (see admin/AdminBootstrap). Used to monitor all
# accounts and AI-token consumption. CHANGE the password in every real environment.
app.admin.enabled=${ADMIN_SEED_ENABLED:true}
app.admin.email=${ADMIN_EMAIL:admin@apiconnector.local}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.full-name=${ADMIN_FULL_NAME:Platform Admin}

# ===== Connector live-test =====
# Blocks "test this upstream" calls from reaching loopback/link-local/private-network hosts
# (SsrfGuard). Only flip to true in trusted local/dev setups that need a private upstream.
app.connector.allow-private-network-hosts=${ALLOW_PRIVATE_NETWORK_HOSTS:false}

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
